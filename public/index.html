<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Motocross Bike Inventory</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero">
        <div>
          <p class="eyebrow">Motocross dealership demo</p>
          <h1>Manage your motocross bike inventory in one place</h1>
          <p class="hero-copy">
            Track bike models, review stock levels, and keep showroom quantities current.
          </p>
        </div>
        <div class="hero-stats">
          <div class="stat-card">
            <span>Total bike models</span>
            <strong id="product-count">0</strong>
          </div>
          <div class="stat-card">
            <span>Total units in stock</span>
            <strong id="unit-count">0</strong>
          </div>
        </div>
      </section>

      <section class="content-grid">
        <form id="product-form" class="panel">
          <h2>Add a bike</h2>
          <label>
            Bike model
            <input type="text" name="name" placeholder="Example: KTM 250 SX-F" required />
          </label>
          <label>
            Class
            <input type="text" name="category" placeholder="Example: 250cc" required />
          </label>
          <label>
            Image URL (optional)
            <input
              type="url"
              name="imageUrl"
              placeholder="https://example.com/bike-photo.jpg"
            />
          </label>
          <div class="field-row">
            <label>
              Quantity
              <input type="number" name="quantity" min="0" step="1" value="0" required />
            </label>
            <label>
              Price
              <input type="number" name="price" min="0" step="0.01" value="0.00" required />
            </label>
          </div>
          <button type="submit">Add bike</button>
          <p id="form-message" class="status-message" role="status" aria-live="polite"></p>
        </form>

        <section class="panel">
          <div class="panel-heading">
            <div>
              <h2>Current bike inventory</h2>
              <p class="panel-copy">Update bike counts or remove models you no longer stock.</p>
            </div>
          </div>
          <div id="inventory-list" class="inventory-list" aria-live="polite"></div>
        </section>
      </section>
    </main>

    <template id="product-template">
      <article class="inventory-item">
        <img class="product-image" alt="" loading="lazy" decoding="async" />
        <div class="inventory-main">
          <div>
            <h3 class="product-name"></h3>
            <p class="product-meta"></p>
          </div>
          <div class="price-badge"></div>
        </div>
        <div class="inventory-actions">
          <label>
            Quantity
            <input class="quantity-input" type="number" min="0" step="1" />
          </label>
          <button class="secondary-button update-button" type="button">Save quantity</button>
          <button class="danger-button delete-button" type="button">Delete</button>
        </div>
      </article>
    </template>

    <script src="/app.js"></script>
  </body>
</html>
